<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEO Leads Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e30;--magenta:#d946ef;--cyan:#06b6d4;--orange:#f97316;--green:#10b981;--text:#e2e8f0;--dim:#94a3b8}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;padding:20px;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;flex-wrap:wrap;gap:10px}
.header h1{font-size:28px;background:linear-gradient(135deg,var(--magenta),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .date{color:var(--dim);font-size:14px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:30px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;transition:transform .2s,box-shadow .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(217,70,239,.15)}
.stat-value{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--magenta),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{color:var(--dim);font-size:12px;margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.stat-card.danger .stat-value{-webkit-text-fill-color:var(--orange);background:none;color:var(--orange)}
.stat-card.success .stat-value{-webkit-text-fill-color:var(--green);background:none;color:var(--green)}
.stat-card.warning .stat-value{-webkit-text-fill-color:var(--orange);background:none;color:var(--orange);font-size:22px}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:16px;margin-bottom:30px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.chart-card h3{font-size:14px;color:var(--dim);margin-bottom:15px;text-transform:uppercase;letter-spacing:1px}
.chart-card canvas{max-height:300px}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;overflow-x:auto}
.table-wrap h3{font-size:14px;color:var(--dim);margin-bottom:15px;text-transform:uppercase;letter-spacing:1px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;color:var(--dim);border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:1px}
td{padding:8px 12px;border-bottom:1px solid rgba(30,30,48,.5)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge.sent{background:rgba(6,182,212,.15);color:var(--cyan)}
.badge.pending{background:rgba(217,70,239,.15);color:var(--magenta)}
.badge.responded{background:rgba(16,185,129,.15);color:var(--green)}
.badge.bounced{background:rgba(249,115,22,.15);color:var(--orange)}
.last-update{text-align:center;color:var(--dim);font-size:12px;margin-top:30px;padding:20px}
@media(max-width:600px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .charts-grid{grid-template-columns:1fr}
  .header h1{font-size:20px}
}
</style>
</head>
<body>
<div class="header">
  <h1>⬡ NEO LEADS DASHBOARD</h1>
  <div class="date" id="lastUpdate"></div>
</div>

<div class="stats-grid" id="statsGrid"></div>

<div class="charts-grid">
  <div class="chart-card"><h3>📈 Crecimiento de leads</h3><canvas id="chartGrowth"></canvas></div>
  <div class="chart-card"><h3>📊 Por sector</h3><canvas id="chartSector"></canvas></div>
  <div class="chart-card"><h3>🗺️ Top ciudades</h3><canvas id="chartCities"></canvas></div>
  <div class="chart-card"><h3>📬 Envíos diarios</h3><canvas id="chartSends"></canvas></div>
</div>

<div class="table-wrap">
  <h3>📋 Últimos leads</h3>
  <table><thead><tr><th>ID</th><th>Nombre</th><th>Sector</th><th>Ciudad</th><th>Email</th><th>Estado</th></tr></thead><tbody id="recentTable"></tbody></table>
</div>

<div class="last-update" id="footerUpdate"></div>

<script>
const COLORS = {magenta:'#d946ef',cyan:'#06b6d4',orange:'#f97316',green:'#10b981',purple:'#a855f7',pink:'#ec4899',yellow:'#eab308',red:'#ef4444'}

async function loadData(){
  try{
    const res=await fetch('data.json?_t='+Date.now())
    const data=await res.json()
    renderStats(data)
    renderGrowth(data.timeline_scrapeo)
    renderSector(data.sectores)
    renderCities(data.ciudades)
    renderSends(data.timeline_envio)
    renderRecent(data.recientes)
    document.getElementById('lastUpdate').textContent='Actualizado: '+data.generado
    document.getElementById('footerUpdate').textContent='⬡ NEO Labs · Última actualización: '+data.generado
  }catch(e){
    document.getElementById('statsGrid').innerHTML='<div style="color:var(--orange);text-align:center;padding:40px;">⚠️ Error cargando datos. Asegúrate de que data.json existe.</div>'
  }
}

function renderStats(data){
  const s=data.stats
  const grid=document.getElementById('statsGrid')
  grid.innerHTML=`
    <div class="stat-card"><div class="stat-value">${s.total}</div><div class="stat-label">Total Leads</div></div>
    <div class="stat-card"><div class="stat-value">${s.con_email}</div><div class="stat-label">Con Email</div></div>
    <div class="stat-card"><div class="stat-value">${s.con_telefono}</div><div class="stat-label">Con Teléfono</div></div>
    <div class="stat-card success"><div class="stat-value">${s.enviados}</div><div class="stat-label">Enviados</div></div>
    <div class="stat-card danger"><div class="stat-value">${s.rebotados}</div><div class="stat-label">Rebotados</div></div>
    <div class="stat-card success"><div class="stat-value">${s.respondidos}</div><div class="stat-label">Respondidos</div></div>
    <div class="stat-card warning"><div class="stat-value">${s.tasa_respuesta}%</div><div class="stat-label">Tasa Respuesta</div></div>
    <div class="stat-card"><div class="stat-value">${s.pendientes_envio}</div><div class="stat-label">Pendientes Envío</div></div>
  `
}

function renderGrowth(timeline){
  if(!timeline||timeline.length===0)return
  const labels=timeline.map(t=>t.dia.slice(5))
  const vals=timeline.map(t=>t.nuevos)
  const total=[],cum=0
  let running=0
  vals.forEach(v=>{running+=v;total.push(running)})
  new Chart(document.getElementById('chartGrowth'),{
    type:'line',data:{
      labels,
      datasets:[
        {label:'Nuevos/día',data:total,backgroundColor:'rgba(217,70,239,.1)',borderColor:COLORS.magenta,fill:true,tension:.3},
      ]
    },options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#94a3b8'}}},
      scales:{x:{ticks:{color:'#94a3b8'}},y:{ticks:{color:'#94a3b8'}}}
    }
  })
}

function renderSector(sectores){
  if(!sectores||sectores.length===0)return
  const labels=sectores.map(s=>s.nombre)
  const total=sectores.map(s=>s.total)
  const email=sectores.map(s=>s.email)
  const palette=[COLORS.magenta,COLORS.cyan,COLORS.orange,COLORS.green,COLORS.purple,COLORS.pink,COLORS.yellow,COLORS.red]
  new Chart(document.getElementById('chartSector'),{
    type:'bar',data:{
      labels,
      datasets:[
        {label:'Total',data:total,backgroundColor:palette.slice(0,labels.length),borderRadius:4},
        {label:'Con email',data:email,backgroundColor:'rgba(6,182,212,.5)',borderRadius:4},
      ]
    },options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#94a3b8'}}},
      scales:{x:{ticks:{color:'#94a3b8'}},y:{ticks:{color:'#94a3b8'}}}
    }
  })
}

function renderCities(ciudades){
  if(!ciudades||ciudades.length===0)return
  new Chart(document.getElementById('chartCities'),{
    type:'doughnut',data:{
      labels:ciudades.map(c=>c.nombre),
      datasets:[{
        data:ciudades.map(c=>c.total),
        backgroundColor:[COLORS.magenta,COLORS.cyan,COLORS.orange,COLORS.green,COLORS.purple,COLORS.pink,COLORS.yellow,COLORS.red,'#6366f1','#14b8a6','#f43f5e','#8b5cf6','#0ea5e9','#84cc16','#a1a1aa']
      }]
    },options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{size:11}}}}
    }
  })
}

function renderSends(timeline){
  if(!timeline||timeline.length===0)return
  new Chart(document.getElementById('chartSends'),{
    type:'bar',data:{
      labels:timeline.map(t=>t.dia.slice(5)),
      datasets:[{
        label:'Envíos',data:timeline.map(t=>t.enviados),
        backgroundColor:COLORS.cyan,borderRadius:4
      }]
    },options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#94a3b8'}}},
      scales:{x:{ticks:{color:'#94a3b8'}},y:{ticks:{color:'#94a3b8',stepSize:1}}}
    }
  })
}

function renderRecent(leads){
  const tbody=document.getElementById('recentTable')
  if(!leads||leads.length===0){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--dim);padding:20px;">No hay leads aún</td></tr>';return}
  tbody.innerHTML=leads.map(l=>{
    let badge='<span class="badge pending">Pendiente</span>'
    if(l.respondido)badge='<span class="badge responded">Respondido</span>'
    else if(l.enviado)badge='<span class="badge sent">Enviado</span>'
    return `<tr><td>#${l.id}</td><td>${l.nombre}</td><td>${l.sector}</td><td>${l.ciudad}</td><td style="color:var(--cyan)">${l.email||'—'}</td><td>${badge}</td></tr>`
  }).join('')
}

loadData()
// Auto refresh every 60 seconds
setInterval(loadData,60000)
</script>
</body>
</html>
