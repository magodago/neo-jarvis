<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEO Lead Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#050505;color:#fff;padding:30px}
h1{font-size:24px;margin-bottom:6px}
h1 span{color:#ff00ff}
.subtitle{color:#666;font-size:13px;margin-bottom:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:30px}
.card{background:linear-gradient(145deg,#111,#0a0a0a);border-radius:12px;padding:20px;border:1px solid #222}
.card .num{font-size:32px;font-weight:800}
.card .label{font-size:12px;color:#888;margin-top:4px}
.card .num.total{color:#888}
.card .num.sent{color:#00ffff}
.card .num.bounce{color:#ff4444}
.card .num.reply{color:#4ade80}
.card .num.pending{color:#ff8800}
.table-wrap{background:#111;border-radius:12px;border:1px solid #222;overflow:hidden;margin-bottom:30px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;background:#0a0a0a;border-bottom:1px solid #222}
td{padding:10px 16px;font-size:13px;color:#ccc;border-bottom:1px solid #1a1a1a}
tr:hover td{background:rgba(255,0,255,0.04)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.badge.sent{background:rgba(0,255,255,0.15);color:#00ffff}
.badge.pending{background:rgba(255,136,0,0.15);color:#ff8800}
.badge.bounce{background:rgba(255,0,0,0.15);color:#ff4444}
.badge.replied{background:rgba(74,222,128,0.15);color:#4ade80}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:30px}
.btn{display:inline-block;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;transition:all 0.3s;border:none;cursor:pointer}
.btn.primary{background:linear-gradient(135deg,#ff00ff,#cc00cc);color:#fff}
.btn.primary:hover{box-shadow:0 0 20px rgba(255,0,255,0.3)}
.btn.secondary{background:#1a1a1a;color:#fff;border:1px solid #333}
.btn.secondary:hover{border-color:#ff00ff}
.btn.green{background:#166534;color:#fff}
.btn.green:hover{box-shadow:0 0 20px rgba(74,222,128,0.3)}
</style>
</head>
<body>

<h1>NEO <span>Lead Dashboard</span></h1>
<p class="subtitle" id="timestamp">Cargando...</p>

<div class="actions">
  <a href="?refresh=1" class="btn primary">🔄 Actualizar</a>
  <a href="/" class="btn secondary">Landing ventas</a>
  <a href="mailto:dortizs76@gmail.com" class="btn green">📧 Responder leads</a>
</div>

<div class="grid" id="stats">
  <div class="card"><div class="num total" id="total">-</div><div class="label">Total Leads</div></div>
  <div class="card"><div class="num sent" id="sent">-</div><div class="label">Enviados</div></div>
  <div class="card"><div class="num bounce" id="bounce">-</div><div class="label">Rebotados</div></div>
  <div class="card"><div class="num reply" id="reply">-</div><div class="label">Respondidos</div></div>
  <div class="card"><div class="num pending" id="pending">-</div><div class="label">Pendientes</div></div>
</div>

<h2 style="font-size:16px;margin-bottom:15px">📊 Por sector</h2>
<div class="table-wrap">
<table id="sector-table">
<thead><tr><th>Sector</th><th>Total</th><th>Enviados</th><th>Rebotes</th><th>Respuestas</th><th>Conversion</th></tr></thead>
<tbody id="sector-body"></tbody>
</table>
</div>

<h2 style="font-size:16px;margin-bottom:15px">📋 Ultimos leads enviados</h2>
<div class="table-wrap">
<table id="sent-table">
<thead><tr><th>Nombre</th><th>Email</th><th>Asunto</th><th>Estado</th><th>Fecha</th></tr></thead>
<tbody id="sent-body"></tbody>
</table>
</div>

<script>
// Datos inline desde el backend
async function loadData() {
  try {
    const r = await fetch('data.json?' + Date.now());
    const d = await r.json();
    document.getElementById('total').textContent = d.stats.total;
    document.getElementById('sent').textContent = d.stats.sent;
    document.getElementById('bounce').textContent = d.stats.bounce;
    document.getElementById('reply').textContent = d.stats.reply;
    document.getElementById('pending').textContent = d.stats.pending;
    document.getElementById('timestamp').textContent = 'Ultima actualizacion: ' + d.timestamp + ' · Total leads: ' + d.stats.total;

    // Sector table
    const sb = document.getElementById('sector-body');
    sb.innerHTML = '';
    for (const s of d.sectors) {
      const conv = s.sent > 0 ? ((s.replies / s.sent) * 100).toFixed(1) + '%' : '-';
      sb.innerHTML += '<tr><td>' + s.sector + '</td><td>' + s.total + '</td><td>' + s.sent + '</td><td>' + s.bounces + '</td><td>' + s.replies + '</td><td>' + conv + '</td></tr>';
    }

    // Sent table
    const tb = document.getElementById('sent-body');
    tb.innerHTML = '';
    const leads = d.sent_leads || [];
    for (const l of leads.slice(0, 20)) {
      const badge = l.status === 'sent' ? 'sent' : l.status === 'bounced' ? 'bounce' : l.status === 'replied' ? 'replied' : 'pending';
      tb.innerHTML += '<tr><td>' + l.name + '</td><td>' + l.email + '</td><td>' + l.subject.slice(0, 40) + '...</td><td><span class="badge ' + badge + '">' + l.status + '</span></td><td>' + (l.date || '-') + '</td></tr>';
    }
  } catch(e) {
    document.getElementById('timestamp').textContent = 'Error cargando datos: ' + e.message;
  }
}
loadData();
</script>

</body>
</html>
