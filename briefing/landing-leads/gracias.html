<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracias — NEO Leads Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center}
.card{background:#12121a;border:1px solid #1e1e30;border-radius:20px;padding:50px 40px;max-width:480px;width:100%}
.check{width:64px;height:64px;background:linear-gradient(135deg,#d946ef,#7c3aed);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:#fff}
h1{font-size:1.6rem;font-weight:800;margin-bottom:10px}
h1 span{background:linear-gradient(135deg,#d946ef,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:#94a3b8;line-height:1.6;margin-bottom:20px;font-size:.95rem}
.btn{display:inline-block;background:linear-gradient(135deg,#d946ef,#7c3aed);color:#fff;padding:14px 36px;border-radius:10px;font-size:1rem;font-weight:700;text-decoration:none;transition:all .3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(217,70,239,.4)}
.contact{color:#94a3b8;font-size:.85rem;margin-top:20px}
.contact a{color:#d946ef;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="check">&#10003;</div>
  <h1>Solicitud <span>recibida</span></h1>
  <p>Gracias por confiar en NEO Leads Pro. Te responderemos en menos de 24 horas para activar tu campana y empezar a conseguirte clientes.</p>
  <a href="index.html" class="btn">VOLVER</a>
  <div class="contact">Mientras tanto, escribenos a <a href="mailto:dortizs76@gmail.com">dortizs76@gmail.com</a></div>
</div>
</body>
</html>
