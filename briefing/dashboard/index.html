<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEO Leads Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px 30px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #e91e63}
header h1{font-size:1.5rem;color:#fff}
header h1 span{color:#e91e63}
#lastUpdate{color:#888;font-size:.8rem}
.container{max-width:1400px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#1a1a2e;border-radius:12px;padding:20px;border:1px solid #333;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
.card h3{color:#888;font-size:.7rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.card .big{font-size:2.2rem;font-weight:700;color:#fff}
.card .label{font-size:.75rem;color:#aaa;margin-top:4px}
.card.total::after{background:#4caf50}
.card.email::after{background:#2196f3}
.card.sent::after{background:#ff9800}
.card.rate::after{background:#e91e63}
.card.revenue::after{background:#9c27b0}
.card.bounce::after{background:#f44336}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
@media(max-width:768px){.charts-row{grid-template-columns:1fr}}
.chart-box{background:#1a1a2e;border-radius:12px;padding:20px;border:1px solid #333}
.chart-box h3{color:#e91e63;margin-bottom:12px;font-size:.9rem}
.leads-table{background:#1a1a2e;border-radius:12px;padding:20px;border:1px solid #333;overflow-x:auto}
.leads-table h3{color:#e91e63;margin-bottom:12px;font-size:.9rem}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:left;padding:10px 8px;border-bottom:2px solid #e91e63;color:#e91e63;font-weight:600;white-space:nowrap}
td{padding:8px;border-bottom:1px solid #333;color:#ccc}
tr:hover{background:#16213e}
.badge{padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600}
.badge.ok{background:#1b5e20;color:#4caf50}
.badge.pending{background:#e65100;color:#ff9800}
.badge.fail{background:#b71c1c;color:#f44336}
.badge.info{background:#0d47a1;color:#2196f3}
.loading{text-align:center;padding:80px 20px;color:#e91e63}
.loading .spin{display:inline-block;width:40px;height:40px;border:3px solid #333;border-top:3px solid #e91e63;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
<h1>NEO <span>Leads</span> Dashboard</h1>
<span id="lastUpdate">—</span>
</header>
<div class="container">
<div class="loading" id="loading"><div class="spin"></div>Cargando datos...</div>
<div id="content" style="display:none">
<div class="grid" id="statsGrid"></div>
<div class="charts-row">
  <div class="chart-box"><h3>📊 Leads por sector</h3><canvas id="sectorChart"></canvas></div>
  <div class="chart-box"><h3>📈 Estado de envíos</h3><canvas id="statusChart"></canvas></div>
</div>
<div class="charts-row">
  <div class="chart-box"><h3>📍 Top ciudades</h3><canvas id="cityChart"></canvas></div>
  <div class="chart-box"><h3>📅 Envíos por día</h3><canvas id="timelineChart"></canvas></div>
</div>
<div class="leads-table"><h3>📋 Últimos leads</h3><table><thead><tr><th>Empresa</th><th>Sector</th><th>Ciudad</th><th>Email</th><th>Estado</th><th>Fecha</th></tr></thead><tbody id="leadsTable"></tbody></table></div>
</div>
</div>
<script>
let charts={};
async function load(){
try{
const r=await fetch('leads_data.json?v='+Date.now());
if(!r.ok)throw new Error('HTTP '+r.status);
const d=await r.json();
document.getElementById('loading').style.display='none';
document.getElementById('content').style.display='block';
document.getElementById('lastUpdate').textContent='📡 '+d.updated;
renderStats(d);renderSectorChart(d);renderStatusChart(d);renderCityChart(d);renderTimeline(d);renderTable(d);
}catch(e){
document.getElementById('loading').innerHTML='<div class="spin"></div>Esperando datos...<br><small>'+e.message+'</small>';
setTimeout(load,5000);
}}
function renderStats(d){
document.getElementById('statsGrid').innerHTML=
`<div class="card total"><h3>Total leads</h3><div class="big">${d.total}</div><div class="label">en base de datos</div></div>
<div class="card email"><h3>Con email</h3><div class="big">${d.with_email}</div><div class="label">${Math.round(d.with_email/d.total*100)}% del total</div></div>
<div class="card sent"><h3>Enviados</h3><div class="big">${d.sent}</div><div class="label">${d.with_email>0?Math.round(d.sent/d.with_email*100):0}% de con email</div></div>
<div class="card bounce"><h3>Rebotados</h3><div class="big">${d.bounced}</div><div class="label">${d.sent>0?Math.round(d.bounced/d.sent*100):0}% tasa de rebote</div></div>
<div class="card rate"><h3>Respuestas</h3><div class="big">${d.replied}</div><div class="label">${d.sent>0?(d.replied/d.sent*100).toFixed(1):0}% conversión</div></div>
<div class="card revenue"><h3>Ingresos est.</h3><div class="big">${(d.replied*299).toLocaleString()}€</div><div class="label">si cada lead compra básica</div></div>`;
}
function renderSectorChart(d){
if(charts.sector)charts.sector.destroy();
charts.sector=new Chart(document.getElementById('sectorChart'),{
type:'bar',
data:{labels:d.sectors.map(s=>s.name),datasets:[{label:'Leads',data:d.sectors.map(s=>s.count),backgroundColor:['#e91e63','#2196f3','#ff9800','#4caf50','#9c27b0','#00bcd4'],borderRadius:6}]},
options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#222'}},x:{grid:{display:false}}}}});
}
function renderStatusChart(d){
if(charts.status)charts.status.destroy();
charts.status=new Chart(document.getElementById('statusChart'),{
type:'doughnut',
data:{labels:['Pendiente','Enviado','Respondido','Rebotado'],datasets:[{data:[d.pending,d.sent,d.replied,d.bounced],backgroundColor:['#ff9800','#4caf50','#2196f3','#f44336'],borderWidth:0}]},
options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#ccc',padding:12}}}}});
}
function renderCityChart(d){
if(charts.city)charts.city.destroy();
charts.city=new Chart(document.getElementById('cityChart'),{
type:'pie',
data:{labels:d.cities.map(c=>c.name),datasets:[{data:d.cities.map(c=>c.count),backgroundColor:['#e91e63','#2196f3','#ff9800','#4caf50','#9c27b0','#00bcd4','#f44336'],borderWidth:0}]},
options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#ccc',font:{size:10},padding:8}}}}});
}
function renderTimeline(d){
const el=document.getElementById('timelineChart');
if(charts.timeline)charts.timeline.destroy();
if(!d.timeline||d.timeline.length===0){el.parentNode.innerHTML='<div class="chart-box"><h3>📅 Envíos por día</h3><p style="color:#666;padding:40px;text-align:center">Aún no hay datos. Los envíos aparecerán aquí.</p></div>';return}
charts.timeline=new Chart(el,{type:'line',
data:{labels:d.timeline.map(t=>t.date),datasets:[{label:'Envíos',data:d.timeline.map(t=>t.count),borderColor:'#4caf50',backgroundColor:'#4caf5033',fill:true,tension:.3,pointRadius:4}]},
options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#222'}},x:{grid:{display:false}}}}});
}
function renderTable(d){
document.getElementById('leadsTable').innerHTML=d.recent.map(l=>
`<tr><td>${l.nombre}</td><td>${l.sector}</td><td>${l.ciudad}</td><td style="color:#888;font-size:.7rem">${l.email||'—'}</td><td><span class="badge ${l.estado==='sent'?'ok':l.estado==='pending'?'pending':'info'}">${l.estado}</span></td><td style="color:#666;font-size:.7rem">${l.fecha||'—'}</td></tr>`
).join('');
};
load();
setInterval(load,30000);
</script>
</body>
</html>
